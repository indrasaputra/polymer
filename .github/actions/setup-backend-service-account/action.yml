name: Setup Backend Service - Account
description: Setup Node, pnpm, and install dependencies for backend service - account

runs:
  using: composite
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 24.16.0

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        run_install: false
        version: 11.5.2

    - name: Install dependencies
      shell: bash
      working-directory: backend/services/account
      run: pnpm install
