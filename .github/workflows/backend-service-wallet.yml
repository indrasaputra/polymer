name: Backend Service - Wallet - CI

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/backend-service-wallet.yml"
      - "backend/services/wallet/**"
  pull_request:
    paths:
      - ".github/workflows/backend-service-wallet.yml"
      - "backend/services/wallet/**"

jobs:
  change-check:
    name: Check changes
    runs-on: ubuntu-latest
    outputs:
      has-change: ${{ steps.filter.outputs.changed }}
    steps:
      - name: Clone repository
        uses: actions/checkout@v6
      - name: Check path filters
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            changed:
              - '.github/workflows/backend-service-wallet.yml'
              - 'backend/services/wallet/**'

  download-module:
    name: Download module
    runs-on: ubuntu-latest
    needs: change-check
    if: needs.change-check.outputs.has-change == 'true'
    defaults:
      run:
        working-directory: backend/services/wallet
    steps:
      - name: Clone repository
        uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ^1.26.x
      - name: Download module
        run: go mod download
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: go-module-${{ github.repository }}-${{ github.sha }}
          restore-keys: |
            go-module-${{ github.repository }}-${{ github.sha }}
  
  import-lint:
    name: Lint import block
    runs-on: ubuntu-latest
    needs: change-check
    if: needs.change-check.outputs.has-change == 'true'
    defaults:
      run:
        working-directory: backend/services/wallet
    steps:
      - name: Clone repository
        uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ^1.26.x
      - name: Install goimports
        run: go install golang.org/x/tools/cmd/goimports@v0.46.0
      - name: Format and check imports
        run: |
          make format
          make check.import

  security-check:
    name: Semgrep scan
    runs-on: ubuntu-latest
    needs: change-check
    if: needs.change-check.outputs.has-change == 'true'
    defaults:
      run:
        working-directory: backend/services/wallet
    permissions:
      contents: read
    env:
      SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v6
      - run: semgrep ci

  go-code-lint:
    runs-on: ubuntu-latest
    needs: change-check
    if: needs.change-check.outputs.has-change == 'true'
    defaults:
      run:
        working-directory: backend/services/wallet
    steps:
      - name: Clone repository
        uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ^1.26.x
      - name: Golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12
          working-directory: backend/services/wallet
          args: --config=.golangci.yml

  unit-test-coverage:
    runs-on: ubuntu-latest
    name: Unit test and coverage
    needs: [change-check, download-module, import-lint, security-check, go-code-lint]
    if: needs.change-check.outputs.has-change == 'true'
    defaults:
      run:
        working-directory: backend/services/wallet
    steps:
      - name: Clone repository
        uses: actions/checkout@v5
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ^1.26.x
      - name: Get cached module
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: go-module-${{ github.repository }}-${{ github.sha }}
          restore-keys: |
            go-module-${{ github.repository }}-${{ github.sha }}
      - name: Run unit test and coverage
        run: make test.cover
      - name: Push coverage result to Codecov
        uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
