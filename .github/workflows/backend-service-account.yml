name: Backend Service - Account - CI

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/backend-service-account.yml"
      - "backend/services/account/**"
  pull_request:
    paths:
      - ".github/workflows/backend-service-account.yml"
      - "backend/services/account/**"

jobs:
  change-check:
    name: Check changes
    runs-on: ubuntu-latest
    outputs:
      has-change: ${{ steps.filter.outputs.changed }}
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
      - name: Check path filters
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            changed:
              - '.github/workflows/backend-service-account.yml'
              - 'backend/services/account/**'

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: change-check
    if: needs.change-check.outputs.has-change == 'true'
    defaults:
      run:
        working-directory: backend/services/account
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
      - name: Setup
        uses: ./.github/actions/setup-backend-service-account
      - name: Run lint
        run: pnpm lint

  type-check:
    name: Type check
    runs-on: ubuntu-latest
    needs: change-check
    if: needs.change-check.outputs.has-change == 'true'
    defaults:
      run:
        working-directory: backend/services/account
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
      - name: Setup
        uses: ./.github/actions/setup-backend-service-account
      - name: Run type check
        run: pnpm tsc --noEmit

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: change-check
    if: needs.change-check.outputs.has-change == 'true'
    defaults:
      run:
        working-directory: backend/services/account
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
      - name: Setup
        uses: ./.github/actions/setup-backend-service-account
      - name: Run tests
        run: pnpm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, type-check, test]
    if: needs.change-check.outputs.has-change == 'true'
    defaults:
      run:
        working-directory: backend/services/account
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
      - name: Setup
        uses: ./.github/actions/setup-backend-service-account
      - name: Run build
        run: pnpm build
