x-default:
  &default
  networks:
    - polymer

services:
  otel-lgtm:
    <<: *default
    image: grafana/otel-lgtm:0.28.0
    container_name: polymer-otel-lgtm
    ports:
      - "3000:3000" # Grafana UI
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
      - "9090:9090" # Prometheus
      - "3200:3200" # Tempo
      - "4040:4040" # Pyroscope
    restart: on-failure

volumes:
  polymer:

networks:
  polymer:
    name: polymer
